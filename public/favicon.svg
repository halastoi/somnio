<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="50%" stop-color="#0d0a2a"/>
      <stop offset="100%" stop-color="#06041a"/>
    </linearGradient>
    <linearGradient id="moon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8b4ff"/>
      <stop offset="40%" stop-color="#9d82ff"/>
      <stop offset="100%" stop-color="#7c5cfc"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d82ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c5cfc" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="star-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0d4ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#9d82ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle background stars -->
  <circle cx="80" cy="100" r="2" fill="#c8b4ff" opacity="0.3"/>
  <circle cx="420" cy="80" r="1.5" fill="#c8b4ff" opacity="0.25"/>
  <circle cx="110" cy="380" r="1.8" fill="#c8b4ff" opacity="0.2"/>
  <circle cx="400" cy="350" r="2" fill="#c8b4ff" opacity="0.15"/>
  <circle cx="350" cy="120" r="1.2" fill="#c8b4ff" opacity="0.35"/>
  <circle cx="150" cy="200" r="1" fill="#c8b4ff" opacity="0.2"/>
  <circle cx="440" cy="240" r="1.5" fill="#c8b4ff" opacity="0.18"/>
  <circle cx="70" cy="280" r="1.3" fill="#c8b4ff" opacity="0.22"/>

  <!-- Moon glow (behind) -->
  <circle cx="256" cy="240" r="130" fill="url(#glow)" filter="url(#blur1)"/>

  <!-- Crescent moon -->
  <path d="M 310 240
           A 100 100 0 1 1 220 148
           A 70 70 0 1 0 310 240 Z"
        fill="url(#moon)"/>

  <!-- Moon inner shadow for depth -->
  <path d="M 310 240
           A 100 100 0 1 1 220 148
           A 70 70 0 1 0 310 240 Z"
        fill="url(#moon)" opacity="0.9"/>

  <!-- Bright star -->
  <g transform="translate(370, 165)">
    <circle r="18" fill="url(#star-glow)" filter="url(#blur2)"/>
    <circle r="4" fill="#e8e0ff"/>
    <!-- Star rays -->
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#e0d4ff" stroke-width="1.5" opacity="0.7"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#e0d4ff" stroke-width="1.5" opacity="0.7"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#e0d4ff" stroke-width="1" opacity="0.4"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#e0d4ff" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Small star -->
  <g transform="translate(155, 130)">
    <circle r="10" fill="url(#star-glow)" filter="url(#blur2)"/>
    <circle r="2.5" fill="#d4c8ff"/>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#d4c8ff" stroke-width="1" opacity="0.6"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#d4c8ff" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Tiny star -->
  <g transform="translate(310, 110)">
    <circle r="6" fill="url(#star-glow)" filter="url(#blur2)"/>
    <circle r="1.8" fill="#d4c8ff"/>
  </g>

  <!-- Z z z floating text -->
  <text x="340" y="310" font-family="sans-serif" font-weight="700" font-size="48" fill="#9d82ff" opacity="0.7">z</text>
  <text x="375" y="280" font-family="sans-serif" font-weight="700" font-size="36" fill="#9d82ff" opacity="0.5">z</text>
  <text x="400" y="258" font-family="sans-serif" font-weight="700" font-size="26" fill="#9d82ff" opacity="0.35">z</text>

  <!-- Sound wave arcs at bottom -->
  <g opacity="0.15" stroke="#9d82ff" fill="none" stroke-width="2.5" stroke-linecap="round">
    <path d="M 160 420 Q 256 390 352 420"/>
    <path d="M 140 440 Q 256 405 372 440"/>
    <path d="M 120 460 Q 256 420 392 460"/>
  </g>
</svg>
